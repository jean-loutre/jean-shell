[tool.pylint.messages_control]
max-line-length = 80

disable = [
  "fixme",
  "invalid-name",
  "missing-docstring",
  "too-few-public-methods",
  "duplicate-code"
]

[tool.isort]
profile = "black"
src_paths = ["jshell", "tests", "noxfile.py"]

[tool.mypy]
strict = true
files = "jshell/**/*.py,tests/**/*.py,noxfile.py"

[tool.pylint]
max-line-length = 110

[tool.pytest.ini_options]
asyncio_mode = "auto"
